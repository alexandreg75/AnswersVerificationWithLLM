version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: grader-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: grader
      POSTGRES_PASSWORD: grader
      POSTGRES_DB: grader
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: grader-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
volumes:
  pgdata:
